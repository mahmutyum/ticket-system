services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    # Başlatma komutu backend/Dockerfile CMD'sinde: prisma migrate deploy && node dist/server.js
    # (Migration'lar backend/prisma/migrations/ altında versiyonlanır.)
    expose:
      - "4000"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:4000/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    networks:
      - app-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    # NPM (veya tarayıcı) bu porta bağlanır. Tek değişken ile düzenlenir.
    ports:
      - "${FRONTEND_PORT:-1111}:1111"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:1111/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - app-network
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-ticketdb}
      POSTGRES_USER: ${DB_USER:-ticket}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    expose:
      - "5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-ticket} -d ${DB_NAME:-ticketdb}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    expose:
      - "6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app-network
    restart: unless-stopped

  # Optional: built-in nginx proxy (use if NOT behind Coolify/NPM)
  # Activate with: docker compose --profile proxy up
  nginx:
    build: ./nginx
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    # uploads volume'u BİLEREK bağlanmadı. Eskiden `uploads:/app/uploads:ro` vardı
    # ve nginx ekleri `alias` ile doğrudan diskten servis ediyordu — backend'e hiç
    # sormadan, yani token ve şirket kapsamı kontrolleri devre dışı. Ekler artık
    # /attachments ucuna proxy'leniyor. Mount'u geri eklemek baypası da geri
    # getirmenin ilk adımı olur: nginx bu dosyalara erişemezse yanlışlıkla
    # servis edemez.
    networks:
      - app-network
    restart: unless-stopped
    profiles:
      - proxy

  pgadmin:
    image: dpage/pgadmin4:latest
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@company.com}
      # Varsayılan YOK — tanımlı değilse pgadmin boş şifreyle açılmayı reddeder.
      # Eskiden `:-changeme` idi ve .env'den satır silinirse sessizce zayıf bir
      # şifreye düşüyordu.
      #
      # Komşuları DB_PASSWORD/REDIS_PASSWORD gibi `:?` KULLANILAMAZ: Compose
      # profil aktif olmasa bile tüm servisleri interpolate eder, yani `:?`
      # burada `docker compose up`'ı PGADMIN_PASSWORD tanımlamayan HERKES için
      # bozardı — pgadmin --profile tools ile opt-in olmasına rağmen.
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    depends_on:
      - postgres
    networks:
      - app-network
    restart: unless-stopped
    profiles:
      - tools

volumes:
  pgdata:
  redisdata:
  uploads:

networks:
  app-network:
    driver: bridge
