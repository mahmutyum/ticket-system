# IP whitelist - internal network and VPN
geo $allowed {
    default          0;
    127.0.0.1/32     1;
    10.0.0.0/8       1;
    172.16.0.0/12    1;
    192.168.0.0/16   1;
    # Add VPN subnets below:
    # 10.8.0.0/24    1;
}

upstream frontend_upstream {
    server frontend:1111;
}

upstream backend_upstream {
    server backend:4000;
}

# HTTP -> HTTPS redirect
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name ticket.internal.company.com;

    ssl_certificate     /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # IP restriction
    if ($allowed = 0) {
        return 403;
    }

    client_max_body_size 25M;

    # API proxy
    location /api/ {
        limit_req zone=api burst=50 nodelay;

        rewrite ^/api/(.*) /$1 break;
        proxy_pass http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE support
        proxy_read_timeout 86400s;
        proxy_buffering off;
        proxy_cache off;
    }

    # Login rate limiting
    location /api/auth/staff/login {
        limit_req zone=login burst=3 nodelay;

        rewrite ^/api/(.*) /$1 break;
        proxy_pass http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Ekler — BACKEND'E PROXY'LENİR, diskten servis EDİLMEZ.
    #
    # Burada `location /uploads/ { alias /app/uploads/; }` vardı. `alias` isteği
    # backend'e HİÇ göndermez: dosyayı doğrudan diskten okur. Sonuç, bu profilde
    # ek yetkilendirmesinin TAMAMEN devre dışı kalmasıydı — /attachments ucundaki
    # token ve şirket kapsamı kontrolleri hiç çalışmıyor, yolu bilen/tahmin eden
    # herkes her eki kimliksiz indirebiliyordu. nginx'in dosya sunucusu olarak
    # hızlı olması, yetkilendirmeyi atlamanın bedelini karşılamıyor.
    #
    # Yetkilendirme uygulamanın işi; nginx yalnızca taşır. Backend her yanıta
    # Content-Disposition, `default-src 'none'; sandbox` CSP'si ve nosniff koyar
    # (attachments.routes.ts) ve bunlar proxy'den olduğu gibi geçer.
    #
    # Bu blok BİLEREK add_header tanımlamıyor: tanımlasaydı server seviyesindeki
    # başlıkların HİÇBİRİ uygulanmazdı (nginx'te add_header miras alınmaz — bu
    # dosyanın en pahalı dersi). Tanımlamayınca server seviyesi miras alınır ve
    # yanıtta iki CSP başlığı olur: backend'inki ve buradaki. CSP'de birden fazla
    # politika varsa HEPSİ uygulanır (kesişim), yani sonuç backend'in sıkı
    # politikasından daha gevşek OLAMAZ. Güvenli.
    location /attachments/ {
        proxy_pass http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Şirket logoları — public (portal giriş sayfasında <img> ile gömülür), ama
    # yine de backend üzerinden: dosya adı doğrulaması ve inline/indirme ayrımı
    # orada yapılıyor.
    location /branding/ {
        proxy_pass http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Frontend
    location / {
        proxy_pass http://frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # CSP — politika frontend/nginx.conf ile aynı, gerekçesi orada açıklanmıştır.
    # (Bu dosya yalnızca --profile proxy ile devreye girer; NPM/Coolify arkasında
    # SPA'yı frontend container'ı servis eder ve CSP'yi o verir.)
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'self'; base-uri 'self'; form-action 'self'; object-src 'none'" always;
}
