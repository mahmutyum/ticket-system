# Development overrides — use with: docker compose -f docker-compose.yml -f docker-compose.dev.yml up
services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    environment:
      # .env'deki NODE_ENV=production'ı ezer: okunabilir log, açık hata
      # detayları ve CORS'ta localhost origin'leri.
      NODE_ENV: development
    volumes:
      - ./backend/src:/app/src
      - ./backend/prisma:/app/prisma
      - backend_node_modules:/app/node_modules
    # Şemayı uygula, sonra watch modunda başlat. migrate deploy idempotent'tir —
    # her restart'ta güvenle çalışır, uygulanmış migration'ları atlar.
    command: sh -c "npx prisma migrate deploy && npx tsx watch src/server.ts"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    environment:
      VITE_API_PROXY_TARGET: http://backend:4000
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html
      - frontend_node_modules:/app/node_modules
    command: npx vite --host 0.0.0.0 --port 1111

volumes:
  backend_node_modules:
  frontend_node_modules:
