server {
    listen 1111;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API proxy → backend container
    location /api/ {
        rewrite ^/api/(.*) /$1 break;
        proxy_pass http://backend:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE support
        proxy_read_timeout 86400s;
        proxy_buffering off;
        proxy_cache off;
    }

    # Ekler ve şirket logoları — backend'e proxy'lenir, DİSKTEN SERVİS EDİLMEZ.
    #
    # Eskiden burada `location /uploads/` vardı ve backend'in @fastify/static'ine
    # proxy'liyordu. O statik servis kaldırıldı (ekler kimliksiz erişilebiliyordu),
    # yerine yetkilendirme yapan /attachments ve /branding uçları geldi. Bu blok
    # güncellenmediği için /branding istekleri buradaki hiçbir location'a uymuyor,
    # `location /`'a düşüp SPA'nın index.html'ini 200 ile döndürüyordu:
    # <img src="/branding/..."> HTML alıyor, logo sessizce kırılıyordu.
    #
    # Yol backend'de DEĞİŞMEDEN geçmeli (rewrite yok): /attachments/<id> ve
    # /branding/<companyId>/<file> route'ları bu prefix'lerle kayıtlı.
    location /attachments/ {
        proxy_pass http://backend:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /branding/ {
        proxy_pass http://backend:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Content Security Policy
    #
    # SPA'yı bu container servis ettiği için CSP burada anlamlıdır — backend'in
    # helmet CSP'si yalnızca kendi yanıtlarını (/api, /uploads, /docs) etkiler.
    #
    # Politika build çıktısı ölçülerek yazıldı:
    #  - script-src 'self': Vite production build'i inline <script> ÜRETMEZ
    #    (index.html yalnızca src'li module script içerir). unsafe-inline/eval
    #    gerekmez — XSS'e karşı asıl koruma budur, zayıflatma.
    #  - style-src 'unsafe-inline': React'in style={{...}} prop'u inline style
    #    attribute üretir (12 kullanım). React'te kaçınılmaz.
    #    Not: tema renklerini uygulayan BrandingProvider style.setProperty()
    #    kullanır — CSSOM API'si, CSP kapsamında değil.
    #  - img-src data: blob:: ikonlar ve dosya önizlemeleri.
    #  - connect-src 'self': API ve SSE aynı origin'den geçer (nginx proxy).
    #  - Uygulama hiçbir dış kaynağa (CDN, font, analytics) başvurmaz.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'self'; base-uri 'self'; form-action 'self'; object-src 'none'" always;

    client_max_body_size 25M;
}
